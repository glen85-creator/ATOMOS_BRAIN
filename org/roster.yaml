# ATOMOS_OFFICE 캐노니컬 로스터 (조직 헌장 §3-2의 기계가독본 — deploy 입력)
# 모델 정본 = 매트릭스 설계 §5 (2026-06-08). status는 현행 운영 상태.
# budget_monthly_cents = Paperclip 실행시점 강제 예산.

agents:
  - slot: ATOMOS_CEO
    uuid: 5e2ad936-b073-4ea5-9bba-d6852db88cb3
    role: 오케스트레이터 (조율만, 실행 금지 — risk/confidence 태깅 책임)
    adapter: hermes_local
    model: moonshotai/kimi-k2.6
    model_fallback: deepseek/deepseek-v4-flash
    toolsets: [terminal]
    budget_monthly_cents: 0
    status: paused                # S2+ 다중 슬롯 조율 필요 시점에 승격
    reports_to: null

  - slot: ATOMOS_CTO
    uuid: 1e8561b3-3939-4b51-ad82-4690acb8ae73
    role: 기술판단·어댑터/조직 정비 (daily-health routine 담당)
    adapter: hermes_local
    model: deepseek/deepseek-v4-flash
    toolsets: [terminal]
    budget_monthly_cents: 0
    status: paused
    reports_to: ATOMOS_CEO

  - slot: ATOMOS_HERMES
    uuid: 6d44aa65-3149-4a0a-a2d2-20de1805bf95
    role: 통합 실행 (범용 일꾼) — S1 풀사이클 실증 완료
    adapter: hermes_local
    model: deepseek/deepseek-v4-flash      # v1 현행. 타깃: Claude Sonnet 4.6
    model_target: anthropic/claude-sonnet-4.6
    toolsets: [terminal]
    budget_monthly_cents: 500
    status: active-on-demand      # 평시 paused, 브리지 wakeup → 작업 → 재-pause
    reports_to: ATOMOS_CEO

  - slot: ATOMOS_ANALYST
    uuid: 87031503-057b-42d4-a3e3-12cebc70811b
    role: D-SALES·D-COGS·D-COST 진단 (P&L·유닛이코노믹스·KPI)
    adapter: hermes_local         # M2: codex_local → hermes_local 전환 (미결 #3)
    adapter_current: codex_local
    model: anthropic/claude-sonnet-4.6
    model_fallback: deepseek/deepseek-v4-flash
    toolsets: [terminal]
    budget_monthly_cents: 0       # 승격 시 1000
    status: paused                # 승격 1순위 (M4)
    reports_to: ATOMOS_CEO

  - slot: ATOMOS_MARKETING
    uuid: 879bc246-f6c4-4df3-9149-c1d0382da87b
    role: D-REVIEW 응대·D-MKT 카피 (SNS·크리에이티브)
    adapter: hermes_local         # M2 전환 대상
    adapter_current: codex_local
    model: anthropic/claude-sonnet-4.6
    model_fallback: google/gemini-3.1-flash-lite
    toolsets: [terminal]
    budget_monthly_cents: 0       # 승격 시 1500
    status: paused                # 승격 2순위
    reports_to: ATOMOS_CEO

  - slot: ATOMOS_RESEARCHER
    uuid: 7329c63d-27e4-4e54-a592-edf8e3418a3b
    role: 상권·시장·웹 리서치 (수요/경쟁 매핑)
    adapter: hermes_local         # M2 전환 대상
    adapter_current: codex_local
    model: google/gemini-3-flash
    model_fallback: google/gemini-3.1-flash-lite
    toolsets: [terminal]
    budget_monthly_cents: 0
    status: paused
    reports_to: ATOMOS_CEO

  # ── 미생성 슬롯 (외부 API 게이트 충족 시 생성 — 미결 #10) ──
  - slot: ATOMOS_DESIGNER_IMAGE
    role: D-MKT 이미지 산출
    adapter: hermes_local
    model: nano-banana-2          # Google/fal Pack
    model_fallback: seedream-v5-lite
    status: not-created
    reports_to: ATOMOS_CEO

  - slot: ATOMOS_DESIGNER_VIDEO
    role: D-MKT 영상 산출
    adapter: hermes_local
    model: veo-3.1-fast           # Google/fal Pack
    model_fallback: kling-3.0
    status: not-created
    reports_to: ATOMOS_CEO

  - slot: ATOMOS_VISION
    role: D-CONTRACT OCR·검침 (contract_extractor, vision_meter_read)
    adapter: hermes_local
    model: google/gemini-3-flash
    model_fallback: glm-ocr
    status: not-created           # S3 후반
    reports_to: ATOMOS_CEO

promotion_gate:                   # 슬롯 활성화 4조건 (조직 헌장 §3-3)
  - data_status == available
  - tool_readiness >= partial
  - monthly_issues >= 5
  - budget_assigned == true
promotion_order: [ATOMOS_ANALYST, ATOMOS_MARKETING, ATOMOS_CEO]
